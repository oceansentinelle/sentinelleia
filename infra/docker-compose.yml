version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: ocean-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: ${DB_MEMORY_LIMIT:-2g}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ocean-backend
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${API_MEMORY_LIMIT:-1g}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ocean-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: /api
      NEXT_PUBLIC_DEFAULT_STATION_ID: BARAG
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${FRONTEND_MEMORY_LIMIT:-512m}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health | grep -q ok || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ingestor:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ocean-ingestor
    restart: unless-stopped
    command: ["python", "-m", "api.ingestion.worker"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      DATA_SOURCE: ${DATA_SOURCE:-erddap}
      STATION_ID: ${STATION_ID:-BARAG}
      INGEST_INTERVAL_SECONDS: ${INGEST_INTERVAL_SECONDS:-900}
      INGEST_LOOKBACK_MINUTES: ${INGEST_LOOKBACK_MINUTES:-60}
      SEANOE_URL: ${SEANOE_URL}
      SEANOE_SOURCE_NAME: ${SEANOE_SOURCE_NAME:-COAST-HF/Arcachon-Ferret}
      CORIOLIS_URL_TEMPLATE: ${CORIOLIS_URL_TEMPLATE}
      CORIOLIS_SOURCE_NAME: ${CORIOLIS_SOURCE_NAME:-Coriolis/Platform}
      ERDDAP_URL_TEMPLATE: ${ERDDAP_URL_TEMPLATE}
      ERDDAP_SOURCE_NAME: ${ERDDAP_SOURCE_NAME:-Coriolis/ERDDAP}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS:-20}
    depends_on:
      timescaledb:
        condition: service_healthy
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${INGESTOR_MEMORY_LIMIT:-512m}

  nginx:
    image: nginx:alpine
    container_name: ocean-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - timescaledb
      - backend
      - frontend
    deploy:
      resources:
        limits:
          memory: ${NGINX_MEMORY_LIMIT:-128m}
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/run/nginx.pid || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  timescaledb_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  default:
    name: ocean-sentinel-network
    driver: bridge
